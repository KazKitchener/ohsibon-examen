<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 500" role="img" aria-label="Étiquette Ohsibon : produits d'érable et soins à base d'érable, en Ontario.">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="oklch(0.985 0.012 80)"/>
      <stop offset="1" stop-color="oklch(0.94 0.024 74)"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="oklch(0.62 0.18 38)"/>
      <stop offset="1" stop-color="oklch(0.5 0.15 32)"/>
    </linearGradient>
    <linearGradient id="bot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="oklch(0.72 0.06 205)"/>
      <stop offset="1" stop-color="oklch(0.56 0.07 218)"/>
    </linearGradient>
    <linearGradient id="jarG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="oklch(0.99 0.01 80)"/>
      <stop offset="1" stop-color="oklch(0.92 0.035 78)"/>
    </linearGradient>
  </defs>

  <!-- accents flottants -->
  <g opacity=".9">
    <path transform="translate(28 44) scale(1.5) rotate(-18 16 16)" fill="oklch(0.8 0.135 72)"
      d="M16 1l2.6 5.3 5.9.5-4.5 3.9 1.4 5.8L16 19.4 10.6 22.5l1.4-5.8L7.5 12.8l5.9-.5z"/>
    <circle cx="430" cy="150" r="9" fill="oklch(0.605 0.052 146)"/>
    <path transform="translate(404 392) scale(1.3)" fill="oklch(0.8 0.135 72)" opacity=".8"
      d="M10 0c5 5 8 9 8 13a8 8 0 1 1-16 0c0-4 3-8 8-13z"/>
  </g>

  <!-- carte / étiquette -->
  <rect x="74" y="36" width="332" height="430" rx="26" fill="url(#card)" stroke="oklch(0.55 0.05 60)" stroke-width="1.5" opacity=".98"/>
  <rect x="90" y="52" width="300" height="398" rx="16" fill="none" stroke="oklch(0.585 0.14 44)" stroke-width="1.4" opacity=".4"/>

  <!-- sceau à la feuille d'érable -->
  <circle cx="240" cy="116" r="42" fill="url(#leaf)"/>
  <circle cx="240" cy="116" r="42" fill="none" stroke="oklch(0.4 0.1 36)" stroke-width="2"/>
  <path transform="translate(240 116) scale(1.5)" fill="oklch(0.97 0.02 80)" stroke="oklch(0.35 0.08 34)" stroke-width="1"
    d="M0 -17 l4 8 6-3 -2 7.4 7.6-.6 -5.2 5.6 7.8 2.8 -7.2 2.3 4.2 5.7 -6.6-1.3 1 7.8 -5.8-4.8 -1.9 4.8 -1.9-4.8 -5.8 4.8 1-7.8 -6.6 1.3 4.2-5.7 -7.2-2.3 7.8-2.8 -5.2-5.6 7.6.6 -2-7.4 6 3z"/>

  <!-- mot-symbole -->
  <text x="240" y="196" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="800"
    font-size="30" letter-spacing="8" fill="oklch(0.27 0.03 52)">OHSIBON</text>
  <text x="240" y="209" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="600"
    font-size="9.5" letter-spacing="2.6" fill="oklch(0.5 0.024 56)">EST DE L'ONTARIO</text>
  <text x="240" y="224" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="600"
    font-size="9.5" letter-spacing="2.6" fill="oklch(0.5 0.024 56)">DEPUIS L'ÉRABLE</text>

  <line x1="150" y1="236" x2="330" y2="236" stroke="oklch(0.55 0.05 60)" stroke-width="1" opacity=".4"/>

  <!-- tablette : bouteille (intérieur) + pot (extérieur) -->
  <g transform="translate(0 6)">
    <!-- bouteille -->
    <g transform="translate(180 268)">
      <rect x="-10" y="-2" width="20" height="11" rx="3" fill="oklch(0.5 0.13 42)"/>
      <path d="M-12 9h24c0 8 6 10 6 20v46a12 12 0 0 1-12 12h-12a12 12 0 0 1-12-12V29c0-10 6-12 6-20z" fill="url(#bot)" stroke="oklch(0.3 0.04 218)" stroke-width="2"/>
      <rect x="-16" y="44" width="32" height="28" rx="5" fill="oklch(0.985 0.015 80)" opacity=".95"/>
      <path d="M0 49l2.6 5.2 5.7.4-4.4 3.8 1.4 5.6L0 63.8 -5.3 66.8l1.4-5.6-4.4-3.8 5.7-.4z" fill="oklch(0.5 0.13 42)"/>
    </g>
    <!-- pot de crème -->
    <g transform="translate(300 304)">
      <rect x="-26" y="-12" width="52" height="14" rx="5" fill="oklch(0.64 0.105 75)"/>
      <path d="M-24 2h48v40a10 10 0 0 1-10 10h-28a10 10 0 0 1-10-10z" fill="url(#jarG)" stroke="oklch(0.55 0.05 70)" stroke-width="2"/>
      <circle cx="0" cy="24" r="13" fill="none" stroke="oklch(0.585 0.14 44)" stroke-width="2.4"/>
      <path d="M0 16l2.6 5.3 5.8.4-4.4 4 1.4 5.7L0 32.4 -5.4 35.4l1.4-5.7-4.4-4 5.8-.4z" fill="oklch(0.585 0.14 44)"/>
    </g>
    <!-- tablette -->
    <line x1="118" y1="356" x2="362" y2="356" stroke="oklch(0.45 0.04 58)" stroke-width="2.5" stroke-linecap="round" opacity=".55"/>
  </g>

  <text x="240" y="392" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="700"
    font-size="11" letter-spacing="2.5" fill="oklch(0.5 0.128 41)">DE L'INTÉRIEUR</text>
  <text x="240" y="410" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="400"
    font-size="9.5" letter-spacing="2" fill="oklch(0.52 0.024 56)">COMME DE L'EXTÉRIEUR</text>
  <path transform="translate(240 430) scale(0.8)" fill="oklch(0.605 0.052 146)"
    d="M0 -8 l2 4 4.5-.3-3.2 3.2 1 4.3L0 5.4 -4.3 7.4l1-4.3-3.2-3.2 4.5.3z"/>
</svg>
